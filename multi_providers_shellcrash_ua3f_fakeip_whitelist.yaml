# ========================================
# 📌 用户配置区
# ========================================

# 代理提供者链接配置，在"url:"后填入你的订阅链接
# 共提供4个代理提供者位置，可根据需要增减，复制粘贴模板后更名即可
# 1.p1请填写自建节点订阅链接，2.p2及之后可填写其他机场订阅链接

proxy-providers:
  1.p1:
    url: ""
    path: ./proxy_provider/p1.yaml 
    type: http
    udp: true
    interval: 86400
    proxy: DIRECT
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 600
      expected-status: "204"
      method: HEAD
    override:
      additional-prefix: "p1 »"

  2.p2:
    url: ""
    path: ./proxy_provider/p2.yaml
    type: http
    udp: true
    interval: 86400
    proxy: DIRECT
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 600
      expected-status: "204"
      method: HEAD
    override:
      additional-prefix: "p2 »"

  3.p3: 
    url: ""
    path: ./proxy_provider/p3.yaml 
    type: http
    udp: true
    interval: 86400
    proxy: DIRECT
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 600
      expected-status: "204"
      method: HEAD
    override:
      additional-prefix: "p3 »"

  4.p4: 
    url: ""
    path: ./proxy_provider/p4.yaml 
    type: http
    udp: true
    interval: 86400
    proxy: DIRECT
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 600
      expected-status: "204"
      method: HEAD
    override:
      additional-prefix: "p4 »"

# ========================================
# 🎯 代理组配置 UA3F
# ========================================

proxies:
    - name: UA3F
      type: http
      server: 127.0.0.1
#      url: http://connectivitycheck.platform.hicloud.com/generate_204
#      udp: false
      port: 1080

