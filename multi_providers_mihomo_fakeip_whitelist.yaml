      - '223.5.5.5'
      - '119.29.29.29'
      - '114.114.114.114'
    'geosite:category-games@cn':
      - '223.5.5.5'
      - '119.29.29.29'
      - '114.114.114.114'
    'rule-set:category-ai-!cn,Twitter,OpenAI,Claude':
      - '8.8.8.8#AI'
      - '1.1.1.1#AI'
      - '9.9.9.9#AI'
      - '208.67.222.222#AI'
