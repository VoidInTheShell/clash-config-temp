    path: ./proxy_provider/p1.yaml 
    <<: *dy
    override:
      additional-prefix: "p1 ¬ї"

  2.p2:
    url: ""
    path: ./proxy_provider/p2.yaml
    <<: *dy
    override:
      additional-prefix: "p2 ¬ї"

  3.p3: 
