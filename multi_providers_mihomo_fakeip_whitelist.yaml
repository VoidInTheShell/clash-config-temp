mixed-port: 7890
redir-port: 7891
tproxy-port: 1536
routing-mark: 7894
mode: rule
ipv6: false
allow-lan: true
log-level: info
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
#--------------------------------------------------------------------------------------#
external-controller: 0.0.0.0:7788
secret: "123456"
external-ui: WebUI/ZashBoard
external-ui-url: "https://gh-proxy.com/github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true
#--------------------------------------------------------------------------------------#
tun:
  enable: true
  stack: mixed
  device: Meta
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  auto-redirect: true
  dns-hijack:
    - any:53
    - tcp://any:53
    - any:853
    - tls://any:853
    - tcp://any:853
#--------------------------------------------------------------------------------------#
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://gh-proxy.com/raw.githubusercontent.com/Loyalsoldier/geoip/release/geoip.dat"
  geosite: "https://gh-proxy.com/github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
  mmdb: "https://gh-proxy.com/github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
#--------------------------------------------------------------------------------------#
profile:
  store-selected: true
  store-fake-ip: true
#--------------------------------------------------------------------------------------#
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'
