dy: &dy
    type: http
    udp: true
    interval: 86400
    proxy: DIRECT
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 600
      expected-status: "204"
      method: HEAD
# вЪ†пЄП smux е§ЪиЈѓе§НзФ®пЉЪйГ®еИЖжЬЇеЬЇдЄНжФѓжМБпЉМе¶ВињЮжО•е§±иі•иѓЈж≥®йЗКжЬђжЃµ
    # smux: # smuxпЉИињЮжО•е§НзФ®пЉМжПРеНЗе§ЪиЈѓе§НзФ®жХИзОЗпЉМеЗПе∞СжП°жЙЛпЉЙ
    #   enabled: true  # еЉАеРѓ smux е§ЪиЈѓе§НзФ®
    #   padding: true  # еҐЮеК†йЪПжЬЇжХ∞жНЃпЉМйШ≤жОҐжµЛпЉИжО®иНРеЉАпЉЙ
    #   protocol: smux # жИЦ smux4

u: &a1     # жЙАжЬЙиЃҐйШЕзїДеЉХзФ®
  - 1.p1
  - 2.p2
  - 3.p3
  - 4.p4

u_s: &a2 # иЗ™еїЇиКВзВєиЃҐйШЕзїДеЉХзФ®
